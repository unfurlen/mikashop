<!DOCTYPE html>
<html>
<head>
<title>Mikashop</title>
<style>
  body { margin: 0; overflow: hidden; background: #222; }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const owl = { x: canvas.width / 2, y: canvas.height / 2 };
const mice = [];
let caught = 0, inventory = 0, coins = 0, cakes = 0;
let cookTimer = 0;
let customer = null, baker = null;
let targetX = owl.x, targetY = owl.y;
let sellMessage = '', buyMessage = '';
let map = 'land';

const house = { x: 0, y: 0, w: 150, h: 130 };
const pan = { x: 0, y: 0 };
const shop = { x: 30, y: 0, w: 150, h: 140 };
const cakeShop = { x: 0, y: 40, w: 150, h: 140 };

const clouds = Array.from({ length: 12 }, () => ({
  x: Math.random() * 2000 - 200,
  y: 50 + Math.random() * (600 - 100),
  speed: 0.2 + Math.random() * 0.4,
  size: 20 + Math.random() * 25
}));
const stars = Array.from({ length: 60 }, () => ({
  x: Math.random() * 2000,
  y: Math.random() * 600,
  size: 1 + Math.random() * 2
}));

function reposition() {
  house.x = Math.max(canvas.width - 170, 20);
  house.y = Math.max(canvas.height - 190, 20);
  pan.x = house.x + house.w / 2;
  pan.y = house.y + house.h - 15;
  shop.y = Math.max(canvas.height - 180, 20);
  cakeShop.x = Math.min(Math.max(canvas.width / 2 - 75, 200), 900);
}
reposition();

let grass = [];
function scatterGrass() {
  grass = Array.from({ length: 300 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
  }));
}
scatterGrass();

function btnRect() {
  const w = 80, h = 36;
  return { x: canvas.width - w - 10, y: 8, w, h };
}

function handlePointer(clientX, clientY) {
  const br = btnRect();
  if (clientX >= br.x && clientX <= br.x + br.w && clientY >= br.y && clientY <= br.y + br.h) {
    map = map === 'land' ? 'sky' : 'land';
    return true;
  }
  return false;
}

function setTarget(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
  const cy = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
  const px = cx - rect.left;
  const py = cy - rect.top;
  if (!handlePointer(px, py)) {
    targetX = px;
    targetY = py;
  }
}
canvas.addEventListener('mousemove', setTarget);
canvas.addEventListener('touchstart', e => { e.preventDefault(); setTarget(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); setTarget(e); }, { passive: false });

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function spawnMouse() {
  let m;
  let tries = 0;
  do {
    m = { x: 50 + Math.random() * (canvas.width - 100), y: 50 + Math.random() * (canvas.height - 100) };
    tries++;
  } while ((dist(m, house) < 100 || dist(m, cakeShop) < 100) && tries < 30);
  return m;
}

for (let i = 0; i < 5; i++) mice.push(spawnMouse());

function update() {
  const d = dist(owl, { x: targetX, y: targetY });
  if (d > 5) {
    owl.x += (targetX - owl.x) / d * 3;
    owl.y += (targetY - owl.y) / d * 3;
  }

  if (map === 'land') {
    for (const m of mice) {
      if (dist(owl, m) < 150) {
        const d2 = dist(owl, m);
        m.x += (m.x - owl.x) / d2 * 3;
        m.y += (m.y - owl.y) / d2 * 3;
      } else {
        m.x += (Math.random() - 0.5) * 2;
        m.y += (Math.random() - 0.5) * 2;
      }
      m.x = Math.max(0, Math.min(canvas.width, m.x));
      m.y = Math.max(0, Math.min(canvas.height, m.y));
    }

    for (let i = mice.length - 1; i >= 0; i--) {
      if (dist(owl, mice[i]) < 30) {
        caught++;
        mice.splice(i, 1);
      }
    }
    if (mice.length < 5) {
      if (mice.length === 0 || Math.random() < 0.003) mice.push(spawnMouse());
    }

    const atPan = dist(owl, pan) < 55;
    if (atPan && caught > 0) {
      cookTimer += 1 / 60;
      if (cookTimer >= 1) { cookTimer = 0; caught--; inventory++; }
    } else cookTimer = 0;

    const atShop = dist(owl, { x: shop.x + shop.w / 2, y: shop.y + shop.h / 2 }) < 80;
    if (atShop && (inventory > 0 || cakes > 0) && !customer) {
      customer = { x: shop.x + shop.w / 2, y: shop.y - 30, progress: 0, timer: 0, buying: null };
      if (inventory > 0) customer.buying = 'mouse';
      else customer.buying = 'cake';
    }
    if (customer) {
      customer.progress += 0.02;
      customer.y = shop.y - 30 + customer.progress * 40;
      if (customer.progress >= 1) {
        customer.timer += 1 / 60;
        if (customer.timer >= 1) {
          if (customer.buying === 'mouse') {
            inventory--; coins++;
            sellMessage = '+1 🪙';
          } else {
            cakes--; coins += 4;
            sellMessage = '+4 🪙';
          }
          setTimeout(() => sellMessage = '', 1200);
          customer = null;
        }
      }
    }

    const atCake = dist(owl, { x: cakeShop.x + cakeShop.w / 2, y: cakeShop.y + cakeShop.h / 2 }) < 80;
    if (atCake && coins >= 3 && !baker) {
      baker = { x: cakeShop.x + cakeShop.w / 2, y: cakeShop.y - 30, progress: 0, timer: 0 };
    }
    if (baker) {
      baker.progress += 0.02;
      baker.y = cakeShop.y - 30 + baker.progress * 40;
      if (baker.progress >= 1) {
        baker.timer += 1 / 60;
        if (baker.timer >= 1) {
          coins -= 3; cakes++; buyMessage = '+1 🧁';
          setTimeout(() => buyMessage = '', 1200);
          baker = null;
        }
      }
    }
  } else {
    // Sky update: clouds drift
    for (const c of clouds) {
      c.x += c.speed;
      if (c.x > canvas.width + 100) c.x = -150;
    }
  }
}

function drawHouse(x, y, w, h) {
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#A52A2A';
  ctx.beginPath();
  ctx.moveTo(x - 15, y);
  ctx.lineTo(x + w / 2, y - 50);
  ctx.lineTo(x + w + 15, y);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#5C2E0B';
  ctx.fillRect(x + w / 2 - 18, y + h - 50, 36, 50);
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(x + w / 2 + 10, y + h - 25, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(x + 15, y + 20, 30, 30);
  ctx.strokeStyle = '#5C2E0B';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 15, y + 20, 30, 30);
  ctx.beginPath();
  ctx.moveTo(x + 30, y + 20);
  ctx.lineTo(x + 30, y + 50);
  ctx.moveTo(x + 15, y + 35);
  ctx.lineTo(x + 45, y + 35);
  ctx.stroke();
}

function drawPan(px, py) {
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.ellipse(px, py, 30, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(px + 30, py - 2);
  ctx.lineTo(px + 55, py - 8);
  ctx.stroke();
  if (cookTimer > 0) {
    ctx.fillStyle = '#ff0';
    ctx.fillRect(px - 20, py - 18, 40 * cookTimer, 4);
  }
}

function drawShop(x, y, w, h) {
  ctx.fillStyle = '#D2691E';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#B22222';
  ctx.beginPath();
  ctx.moveTo(x - 10, y);
  ctx.lineTo(x + w / 2, y - 30);
  ctx.lineTo(x + w + 10, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#8B0000';
  ctx.lineWidth = 2;
  for (let i = 1; i < 4; i++) {
    const sx = x + (w / 4) * i;
    ctx.beginPath();
    ctx.moveTo(sx, y);
    ctx.lineTo(sx, y - 25 - Math.abs(i - 2) * 5);
    ctx.stroke();
  }
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x + 5, y + h - 35, w - 10, 28);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐭🪙  🧁4🪙', x + w / 2, y + 15);
  ctx.fillStyle = '#FFF8DC';
  ctx.font = '12px sans-serif';
  ctx.fillText("OWL'S SHOP", x + w / 2, y - 40);
  if (customer) {
    ctx.font = '32px serif';
    ctx.fillText('🧑', customer.x, customer.y);
    ctx.fillStyle = '#FFF';
    ctx.font = '11px sans-serif';
    ctx.fillText(customer.buying === 'mouse' ? '🐭' : '🧁', customer.x + 22, customer.y - 18);
  }
  ctx.font = '22px serif';
  ctx.fillText('🪙', x + w / 2, y + h / 2 + 5);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('x ' + coins, x + w / 2 + 20, y + h / 2 + 6);
}

function drawCakeShop(x, y, w, h) {
  ctx.fillStyle = '#FFB6C1';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#FF69B4';
  ctx.beginPath();
  ctx.moveTo(x - 10, y);
  ctx.lineTo(x + w / 2, y - 30);
  ctx.lineTo(x + w + 10, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#FF1493';
  ctx.lineWidth = 2;
  for (let i = 1; i < 4; i++) {
    const sx = x + (w / 4) * i;
    ctx.beginPath();
    ctx.moveTo(sx, y);
    ctx.lineTo(sx, y - 25 - Math.abs(i - 2) * 5);
    ctx.stroke();
  }
  ctx.fillStyle = '#FFF';
  ctx.fillRect(x + 10, y + h - 50, w - 20, 18);
  ctx.strokeStyle = '#CCC';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 10, y + h - 50, w - 20, 18);
  ctx.font = '18px serif';
  ctx.fillText('🧁', x + w / 2 - 15, y + h - 42);
  ctx.fillText('🧁', x + w / 2 + 15, y + h - 42);
  ctx.fillStyle = '#FF69B4';
  ctx.fillRect(x + 5, y + h - 35, w - 10, 28);
  ctx.fillStyle = '#FF1493';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText('🧁 3🪙', x + w / 2, y + 15);
  ctx.fillStyle = '#FFF';
  ctx.font = '12px sans-serif';
  ctx.fillText("CAKE SHOP", x + w / 2, y - 40);
  if (baker) {
    ctx.font = '32px serif';
    ctx.fillText('🧑‍🍳', baker.x, baker.y);
  }
  ctx.font = '22px serif';
  ctx.fillText('🧁', x + w / 2, y + h / 2 + 5);
  ctx.fillStyle = '#FF1493';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('x ' + cakes, x + w / 2 + 20, y + h / 2 + 6);
}

function drawButton() {
  const br = btnRect();
  const label = map === 'land' ? 'Fly 🦅' : 'Land 🏠';
  ctx.fillStyle = map === 'land' ? '#4169E1' : '#8B4513';
  ctx.beginPath();
  ctx.roundRect(br.x, br.y, br.w, br.h, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, br.x + br.w / 2, br.y + br.h / 2);
}

function drawSky() {
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0B0B2B');
  grad.addColorStop(0.4, '#1B1B4B');
  grad.addColorStop(0.7, '#3B3B7B');
  grad.addColorStop(1, '#6B6BAB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  ctx.fillStyle = '#FFF';
  for (const s of stars) {
    const sx = ((s.x + performance.now() * 0.005) % (canvas.width + 50)) - 25;
    ctx.beginPath();
    ctx.arc(sx, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Clouds
  ctx.font = '42px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const c of clouds) {
    ctx.fillText('☁️', c.x, c.y);
  }

  // Moon
  ctx.font = '50px serif';
  ctx.fillText('🌙', canvas.width - 80, 70);
}

function draw() {
  if (map === 'land') {
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const g of grass) ctx.fillText('🌿', g.x, g.y);

    drawCakeShop(cakeShop.x, cakeShop.y, cakeShop.w, cakeShop.h);
    drawShop(shop.x, shop.y, shop.w, shop.h);
    drawHouse(house.x, house.y, house.w, house.h);
    drawPan(pan.x, pan.y);
  } else {
    drawSky();
  }

  if (caught > 0) {
    ctx.font = '16px serif';
    ctx.fillText('🐭', owl.x + 25, owl.y - 15);
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.fillText('x' + caught, owl.x + 38, owl.y - 17);
  }
  if (inventory > 0) {
    ctx.font = '14px serif';
    ctx.fillText('🎒', owl.x + 28, owl.y + 18);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.fillText('x' + inventory, owl.x + 40, owl.y + 16);
  }
  if (cakes > 0) {
    ctx.font = '16px serif';
    ctx.fillText('🧁', owl.x - 30, owl.y + 18);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.fillText('x' + cakes, owl.x - 18, owl.y + 16);
  }

  ctx.font = '28px serif';
  if (map === 'land') {
    for (const m of mice) ctx.fillText('🐭', m.x, m.y);
  } else {
    ctx.fillText('🦇', 100 + Math.sin(performance.now() * 0.001) * 80, 200 + Math.sin(performance.now() * 0.0015) * 60);
    ctx.fillText('🦇', canvas.width - 120 + Math.sin(performance.now() * 0.0012) * 70, 150 + Math.cos(performance.now() * 0.001) * 50);
  }

  ctx.font = '40px serif';
  ctx.fillText('🦉', owl.x, owl.y);

  ctx.fillStyle = '#fff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🐭 x ' + caught + '  🎒 x ' + inventory + '  🧁 x ' + cakes + '  🪙 ' + coins, 12, 24);

  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('v0.3', canvas.width - 10, 50);

  drawButton();

  if (sellMessage) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(sellMessage, shop.x + shop.w / 2, shop.y - 55);
  }
  if (buyMessage) {
    ctx.fillStyle = '#FF69B4';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(buyMessage, cakeShop.x + cakeShop.w / 2, cakeShop.y - 55);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
